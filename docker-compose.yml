# LiteLLM gateway: Postgres (keys/spend), Redis (router limits + classifier cache), Cloudflare Tunnel (Linux/Pi: host network).
# Local dev without tunnel: `docker compose up -d postgres redis litellm`
# With tunnel: set CF_TUNNEL_TOKEN in .env, then `docker compose --profile tunnel up -d`
# Static UI (built by Docker): included in default `docker compose up --build`

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm}
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
    volumes:
      - litellm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-litellm} -d ${POSTGRES_DB:-litellm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - litellm_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Versioned stable image includes fixes for periodic budget-reset job (avoid Prisma Json? `not: None` crashes on rolling main-stable).
  # Override with `LITELLM_IMAGE` in `.env`; see LiteLLM PR #26085 / #26346.
  litellm:
    image: ${LITELLM_IMAGE:-litellm/litellm-database:v1.83.14-stable}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${LITELLM_HOST_PORT:-4001}:4000"
    volumes:
      - ./config/proxy_config.yaml:/app/config.yaml:ro
      - ./hooks:/app/custom_handlers:ro
    environment:
      PYTHONPATH: /app
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-}
      DATABASE_URL: ${DATABASE_URL}
      STORE_MODEL_IN_DB: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      PROXY_BASE_URL: ${PROXY_BASE_URL:-}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      GATEWAY_REDIS_URL: ${GATEWAY_REDIS_URL:-redis://redis:6379/0}
      GATEWAY_CLASSIFIER_MODEL: ${GATEWAY_CLASSIFIER_MODEL:-deepseek-chat}
      GATEWAY_CLASSIFIER_TTL_SECONDS: ${GATEWAY_CLASSIFIER_TTL_SECONDS:-604800}
      GATEWAY_DEEPSEEK_API_BASE: ${GATEWAY_DEEPSEEK_API_BASE:-https://api.deepseek.com}
      GATEWAY_BASIC_MODEL: ${GATEWAY_BASIC_MODEL:-deepseek/deepseek-chat}
      GATEWAY_PREMIUM_MODEL: ${GATEWAY_PREMIUM_MODEL:-anthropic/claude-sonnet-4-20250514}
      GATEWAY_FALLBACK_MODEL: ${GATEWAY_FALLBACK_MODEL:-openai/gpt-4o}
      GATEWAY_KIMI_MODEL: ${GATEWAY_KIMI_MODEL:-openai/moonshot-v1-8k}
      GATEWAY_KIMI_API_BASE: ${GATEWAY_KIMI_API_BASE:-https://api.moonshot.cn/v1}
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]

  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    network_mode: host
    environment:
      # cloudflared reads token from TUNNEL_TOKEN
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
    command: tunnel run

  gateway-ui:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - litellm
    ports:
      - "${GATEWAY_UI_PORT:-4000}:80"

volumes:
  litellm_pgdata:
    name: litellm_pgdata
  litellm_redisdata:
    name: litellm_redisdata
