# Proxy config — mounted as /app/config.yaml in Docker.
# Email: set RESEND_API_KEY in the environment (see docker-compose / .env).

model_list:
  - model_name: gateway-basic
    litellm_params:
      model: os.environ/GATEWAY_BASIC_MODEL
      api_key: os.environ/DEEPSEEK_API_KEY
  - model_name: gateway-premium
    litellm_params:
      model: os.environ/GATEWAY_PREMIUM_MODEL
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: gateway-openai-fallback
    litellm_params:
      model: os.environ/GATEWAY_FALLBACK_MODEL
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gateway-kimi
    litellm_params:
      model: os.environ/GATEWAY_KIMI_MODEL
      api_base: os.environ/GATEWAY_KIMI_API_BASE
      api_key: os.environ/MOONSHOT_API_KEY

router_settings:
  redis_host: os.environ/REDIS_HOST
  redis_port: os.environ/REDIS_PORT

litellm_settings:
  drop_params: true
  callbacks:
    - custom_handlers.gateway_plugin.gateway_handler
    - resend_email
  num_retries: 2
  request_timeout: 120
  fallbacks:
    - gateway-premium: [gateway-openai-fallback]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Enables native LiteLLM UI flows (teams/users/roles). SSO still requires provider env vars + PROXY_BASE_URL.
  # See https://docs.litellm.ai/docs/proxy/admin_ui_sso
  allow_user_auth: true
